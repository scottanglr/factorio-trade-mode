name: Regenerate Suggested Prices

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Regenerate suggested prices config
        run: npx tsx src/generate_suggested_prices_config.ts --output src/suggested-prices-config.lua

      - name: Commit updated config
        shell: bash
        run: |
          if git diff --quiet -- src/suggested-prices-config.lua; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/suggested-prices-config.lua
          git commit -m "chore: regenerate suggested prices config"
          git push
