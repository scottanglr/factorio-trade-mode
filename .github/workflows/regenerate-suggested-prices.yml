name: Regenerate Suggested Prices

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    env:
      DATA_RAW_URL: https://gist.githubusercontent.com/Bilka2/6b8a6a9e4a4ec779573ad703d03c1ae7/raw

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Regenerate suggested prices configs
        run: npx tsx scripts/generate-suggested-prices.ts --input-url "$DATA_RAW_URL"

      - name: Commit updated config
        shell: bash
        run: |
          if git diff --quiet -- trade_mode/suggested-prices-config.lua trade_mode/suggested-prices-vanilla.lua trade_mode/suggested-prices-space-age.lua; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add trade_mode/suggested-prices-config.lua trade_mode/suggested-prices-vanilla.lua trade_mode/suggested-prices-space-age.lua
          git commit -m "chore: regenerate suggested prices configs"
          git push
