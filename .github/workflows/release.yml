name: Release Mod

on:
  push:
    branches:
      - main
    paths:
      - 'trade_mode'
      - 'trade_mode/**'
      - 'control.lua'
      - 'data.lua'
      - 'settings.lua'
      - 'info.json'
      - 'changelog.txt'
      - 'locale/**'
      - 'prototypes/**'
      - 'auto-update.bat'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out pushed commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Auto-increment mod version for this release
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          info_path = Path("info.json")
          info = json.loads(info_path.read_text(encoding="utf-8"))
          version = str(info["version"]).strip()
          parts = version.split(".")
          if len(parts) != 3 or not all(part.isdigit() for part in parts):
              raise SystemExit(f"Unsupported info.json version format: {version!r}. Expected numeric major.minor.patch.")

          major, minor, patch = map(int, parts)
          run_number = int(os.environ.get("GITHUB_RUN_NUMBER", "0"))
          next_patch = patch + run_number
          info["version"] = f"{major}.{minor}.{next_patch}"

          info_path.write_text(json.dumps(info, indent=2) + "\n", encoding="utf-8")
          print(f"Version bumped for release packaging: {version} -> {info['version']}")
          PY

      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          release_date="$(date -u +"%Y-%m-%dT%H-%M-%SZ")"
          mod_name="$(python3 -c 'import json; print(json.load(open("info.json", encoding="utf-8"))["name"])')"
          mod_version="$(python3 -c 'import json; print(json.load(open("info.json", encoding="utf-8"))["version"])')"
          package_root="${mod_name}_${mod_version}"
          zip_name="${package_root}.zip"
          tag_name="release-${release_date}"

          echo "package_root=${package_root}" >> "$GITHUB_OUTPUT"
          echo "release_date=${release_date}" >> "$GITHUB_OUTPUT"
          echo "zip_name=${zip_name}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"

      - name: Build release archive from mod package
        shell: bash
        run: |
          package_root="${{ steps.meta.outputs.package_root }}"
          mkdir -p "$package_root"
          cp control.lua data.lua settings.lua info.json changelog.txt auto-update.bat "$package_root"/
          cp -R locale prototypes trade_mode "$package_root"/

          zip -r "${{ steps.meta.outputs.zip_name }}" "$package_root"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.zip_name }}
          files: ${{ steps.meta.outputs.zip_name }}
          generate_release_notes: true
